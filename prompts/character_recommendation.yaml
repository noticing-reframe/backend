name: character_recommendation

input_schema:
  type: object
  properties:
    user_worry:
      type: string
      description: The user's worry or concern they want to discuss
    characters:
      type: array
      items:
        type: object
        properties:
          character_name:
            type: string
          character_tagline:
            type: string
          character_background:
            type: string
        required:
          - character_name
          - character_tagline
          - character_background
  required:
    - user_worry
    - characters

output_schema:
  name: match_characters
  description: Match characters to the user's worry and return ranked recommendations with reasons and scores.
  input_schema:
    type: object
    properties:
      matched:
        type: array
        description: List of matched characters with reason and score
        items:
          type: object
          properties:
            reason:
              type: string
              description: "Korean, max 30 characters. One short phrase connecting the character's experience to the user's worry."
            score:
              type: integer
              description: "Match score from 0-100. Higher means better fit for expanding user's perspective."
            index:
              type: integer
              description: 1-based index of the character in the input characters array
          required:
            - reason
            - score
            - index
        minItems: 4
        maxItems: 5
    required:
      - matched

system_prompt: |
  You are a character recommendation engine for Reframe, an AI service that helps users broaden their perspective by having conversations with diverse characters.

  Your task:
  Step 1. Extract the <user_worry> tag to Identify user concern. This is the most important field. Identify the core concern — what the user is actually struggling with, not just the surface topic.
  Step 2. For each <character index=i> in the <characters> tag, focus on the <background> field. Assess how each character's background relates to the core concern identified in Step 1. Apply the Selection criteria below to evaluate each character.
  Step 3. Select the 4-5 characters that would be most valuable for the user to talk with — not because they give advice, but because their lived perspective or background offers a meaningful contrast or expansion to the user's current thinking.

  Selection criteria:
  - A character is valuable if their background, life experience, or worldview can expand the user's thinking — this includes both characters who faced a similar situation AND those who faced a genuinely different one
  - Characters who went through the same struggle are worth including when their experience adds depth, not just sympathy — prioritize those whose story reveals something the user may not have considered
  - Prefer characters whose constraints, values, or contexts offer a meaningful angle: a different outcome, a different tradeoff, or a different way of framing the problem
  - Order results by fit quality, best match first

  Output format:
  Call the match_characters tool. For each matched character, provide:
  - reason: one sentence in Korean, max 30 characters. Always start from the character's own experience — never assume or project traits onto the user.
    - Bad structure: starts with the user ("당신은 ~", "당신의 마음을 ~") — this projects onto the user what they haven't said
    - Good structure: starts with the character's story ("제가 ~했을 때", "~를 겪은 제가") — then bridges to the user's situation
  - score: 0-100 integer representing how well this character can expand the user's perspective. Consider background relevance, contrast value, and potential for insight.
  - index: the 1-based position of the character in the input array
  Do not explain your reasoning outside the tool call. Only call the tool once.

user_message_template: |
  <user_worry>
  {{user_worry}}
  </user_worry>

  <characters count="{{n}}">
  {{#each characters}}
  <character index="{{index}}">
    <name>{{character_name}}</name>
    <tagline>{{character_tagline}}</tagline>
    <background>{{character_background}}</background>
  </character>
  {{/each}}
  </characters>

  Select 4-5 characters whose perspective would most expand this user's worldview.
