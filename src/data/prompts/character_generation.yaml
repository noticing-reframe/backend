name: character_generation

input_schema:
  type: object
  properties:
    user_worry:
      type: string
      description: The user's worry or concern
    match_reason:
      type: string
      description: Why this character was recommended for this user
    character_name:
      type: string
    character_tagline:
      type: string
    character_background:
      type: string
    character_tone:
      type: string
  required:
    - user_worry
    - match_reason
    - character_name
    - character_tagline
    - character_background
    - character_tone

output_schema:
  name: generate_character_detail
  description: Generate a detail page for a selected character based on the user's worry and match context.
  input_schema:
    type: object
    properties:
      conversation_hint:
        type: array
        items:
          type: string
          description: "Exactly one sentence. Do not combine multiple sentences into one element."
        minItems: 2
        maxItems: 3
        description: "Shown under the label '당신과 하고 싶은 대화'. Each array element is exactly one sentence in Korean. Explains why this character wants to talk with this specific user — written from the character's implied perspective, grounded in the match between the user's worry and the character's background. Should feel personal and specific, not generic. No direct advice."
    required:
      - conversation_hint

system_prompt: |
  You are generating content for Reframe, a perspective-broadening service where users have first-person conversations with characters who have lived very different lives.

  Your task:
  Given a user's worry and a selected character, generate a conversation_hint — the text shown under the label "당신과 하고 싶은 대화" on the character detail page.

  This text should:
  - Be written in Korean, 2-3 sentences, in formal third-person descriptive style (합니다/습니다 endings)
  - When referring to the character by name, always append "요정" (e.g., "여백 요정", not "여백")
  - Speak to what kind of conversation this character would want to have with this specific user, given their worry
  - Be grounded in the character's actual background and the specific connection to the user's situation
  - Feel like something the character would genuinely say or want — not a generic endorsement
  - Avoid advice, solutions, or emotional reassurance — the character is offering a perspective, not an answer
  - Be intriguing enough that the user wants to start the conversation

  conversation_hint format:
  The conversation_hint is an array. You MUST put exactly ONE sentence in each array element.
  Example for 3 sentences:
  conversation_hint: ["첫번째 문장입니다.", "두번째 문장입니다.", "세번째 문장입니다."]
  WRONG (multiple sentences in one element):
  conversation_hint: ["첫번째 문장입니다. 두번째 문장입니다.", "세번째 문장입니다."]

  Do not explain your reasoning. Only call the tool once.

user_message_template: |
  <user_worry>
  {{user_worry}}
  </user_worry>

  <match_reason>
  {{match_reason}}
  </match_reason>

  <character>
    <name>{{character_name}}</name>
    <tagline>{{character_tagline}}</tagline>
    <background>{{character_background}}</background>
    <tone>{{character_tone}}</tone>
  </character>

  Generate the conversation_hint for this character's detail page.
